# @package _global_
# Cloned from reality.yaml and tuned for Unitree Go2.

defaults:
  - /policy: vlfm_config_base
  - _self_

policy:
    name: "RealityITMPolicyV2"
    pointnav_policy_path: "data/pointnav_weights.pth"
    depth_image_shape: [212, 240]  # height, width — must match the trained policy
    pointnav_stop_radius: 0.9
    use_max_confidence: False
    object_map_erosion_size: 5
    exploration_thresh: 0.0
    obstacle_map_area_threshold: 1.5  # square meters
    text_prompt: "Seems like there is a target_object ahead."
    min_obstacle_height: 0.1
    max_obstacle_height: 1.5
    agent_radius: 0.25  # Go2 footprint is smaller than Spot, but pad for safety

env:
  max_body_cam_depth: 5.0       # ZoeDepth max for the front cam
  max_gripper_cam_depth: 5.0    # vestigial — Go2 has no gripper cam
  max_lin_dist: 0.2
  max_ang_dist: 0.523599        # 30 deg
  time_step: 0.7
  goal: "office chair"

go2:
  network_interface: "enp2s0"   # TODO: set to the iface connecting to the robot
